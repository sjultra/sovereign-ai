apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: {{ .Values.namespace }}

---

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: admin-env
  namespace: {{ .Values.namespace }}
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-store
  target:
    name: admin-env
    creationPolicy: Owner
  data:
    - secretKey: CORE_URL
      remoteRef:
        key: app/{{ .Values.admin.name }}/{{ .Values.env }}
        property: CORE_URL

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.admin.name }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.admin.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.admin.name }}
    spec:
      serviceAccountName: admin
      containers:
        - name: {{ .Values.admin.name }}
          image: "{{ .Values.admin.imageRepository }}:{{ .Values.admin.imageTag }}"
          imagePullPolicy: {{ .Values.admin.imagePullPolicy }}
          command: ["npm", "run", "start"]
          ports:
            - containerPort: 3000
              name: http

          env:
            - name: CORE_URL
              valueFrom:
                secretKeyRef:
                  name: admin-env
                  key: CORE_URL

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.admin.name }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ .Values.admin.name }}
  ports:
    - name: https
      protocol: TCP
      port: 443
      targetPort: 3000
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.admin.ingressName }}
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - host: {{ .Values.admin.ingressDomain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.admin.name }}
                port:
                  number: 80