apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          ports:
            - containerPort: {{ .Values.ollama.service.port }}
          resources:
            limits:
              nvidia.com/gpu: {{ .Values.ollama.gpu.count | quote }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          readinessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/tags
              port: {{ .Values.ollama.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: ollama-data
          hostPath:
            path: {{ .Values.ollama.hostModelPath }}
            type: 
            
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app: ollama
spec:
  selector:
    app: ollama
  ports:
    - port: {{ .Values.ollama.service.port }}
      targetPort: {{ .Values.ollama.service.port }}
      protocol: TCP