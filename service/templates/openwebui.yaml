apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwebui
  namespace: {{ .Values.namespace }}
  labels:
    app: openwebui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openwebui
  template:
    metadata:
      labels:
        app: openwebui
    spec:
      containers:
        - name: openwebui
          image: "{{ .Values.openwebui.image.repository }}:{{ .Values.openwebui.image.tag }}"
          ports:
            - containerPort: {{ .Values.openwebui.service.port }}
          env:
            - name: OLLAMA_BASE_URL
              value: "http://ollama:{{ .Values.ollama.service.port }}"
            - name: WEBUI_AUTH
              value: "false"
            - name: ENABLE_SIGNUP
              value: "false"
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.openwebui.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.openwebui.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 12

---
apiVersion: v1
kind: Service
metadata:
  name: openwebui
  namespace: {{ .Values.namespace }}
  labels:
    app: openwebui
spec:
  type: {{ .Values.openwebui.service.type }}
  selector:
    app: openwebui
  ports:
    - port: {{ .Values.openwebui.service.port }}
      targetPort: {{ .Values.openwebui.service.port }}
      protocol: TCP